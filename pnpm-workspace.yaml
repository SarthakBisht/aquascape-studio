# pnpm 11+ reads build-script approvals here (the package.json "pnpm" field is
# no longer honored). Without approving these, `pnpm install` aborts with
# ERR_PNPM_IGNORED_BUILDS for native deps that need a postinstall build.
allowBuilds:
  sharp: true
  unrs-resolver: true
  esbuild: true
  protobufjs: true
  # transformers.js pulls onnxruntime-node (optional, Node-only). We use the
  # browser WASM path (onnxruntime-web), so skip its native postinstall.
  onnxruntime-node: false
